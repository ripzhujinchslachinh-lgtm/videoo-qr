<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
height:100%;
}

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}
</style>
</head>

<body>

<video id="player" autoplay playsinline></video>

<script>
const videos = ["video1.mp4","video2.mp4"];

let i = 0;
const player = document.getElementById("player");

function playVideo(){
player.src = videos[i];
player.play();
}

player.onended = function(){
i++;
if(i >= videos.length) i = 0;
playVideo();
};

playVideo();
</script>

</body>
</html>
