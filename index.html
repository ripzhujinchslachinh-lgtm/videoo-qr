<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<script>
const videos = [
"https://drive.google.com/uc?export=download&id=16MzTqiYofwwobu9jg0siVYLza6slr1Zb",
"https://drive.google.com/uc?export=download&id=1-X046MHgs_GANavbZA7X9D_36q6dghcy"
];

let i = 0;
const player = document.getElementById("player");

function playVideo(){
player.src = videos[i];
player.play();
}

player.onended = function(){
i++;
if(i >= videos.length) i = 0;
playVideo();
};

playVideo();
</script>

</body>
</html>
