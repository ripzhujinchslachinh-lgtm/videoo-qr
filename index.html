<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
overflow:hidden;
}

iframe{
width:100vw;
height:100vh;
border:none;
}
</style>
</head>

<body>

<iframe id="player" allow="autoplay"></iframe>

<script>
const videos = [
"https://drive.google.com/file/d/16MzTqiYofwwobu9jg0siVYLza6slr1Zb/preview",
"https://drive.google.com/file/d/1-X046MHgs_GANavbZA7X9D_36q6dghcy/preview"
];

let i = 0;
const player = document.getElementById("player");

function playVideo(){
player.src = videos[i];
}

function nextVideo(){
i++;
if(i >= videos.length) i = 0;
playVideo();
}

playVideo();

// tự chuyển sau X giây (chỉnh theo độ dài video)
setInterval(nextVideo, 66000); // 15 giây
</script>

</body>
</html>
